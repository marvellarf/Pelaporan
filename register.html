```html
<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registrasi Pelapor</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card register-card">

        <div class="auth-logo">

            <h1>
                Registrasi Akun
            </h1>

            <p>
                Sistem Pelaporan Kerusakan Fasilitas Kampus
            </p>

        </div>

        <form id="registerForm">

            <div class="register-grid">

                <div class="form-group">

                    <label>
                        Nama Lengkap
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan nama lengkap"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        NIM / NIP
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan NIM atau NIP"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Program Studi
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Contoh: Pendidikan Teknologi Informasi"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Fakultas
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Masukkan fakultas"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Angkatan
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        placeholder="2023"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Jenis Pengguna
                    </label>

                    <select class="form-control">

                        <option>
                            Mahasiswa
                        </option>

                        <option>
                            Dosen
                        </option>

                        <option>
                            Staf
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Email
                    </label>

                    <input
                        type="email"
                        class="form-control"
                        placeholder="nama@email.com"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Nomor Telepon
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="08xxxxxxxxxx"
                        required>

                </div>

                <div class="form-group full-width">

                    <label>
                        Alamat
                    </label>

                    <textarea
                        class="form-control"
                        rows="3"
                        placeholder="Masukkan alamat lengkap"
                        required></textarea>

                </div>

                <div class="form-group">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Buat username"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Masukkan password"
                        required>

                </div>

                <div class="form-group full-width">

                    <label>
                        Konfirmasi Password
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Ulangi password"
                        required>

                </div>

            </div>

            <button
                type="submit"
                class="btn">

                Daftar Akun

            </button>

        </form>

        <div class="auth-footer">

            Sudah memiliki akun?

            <a href="index.html">

                Login

            </a>

        </div>

    </div>

</div>

<script>

document
.getElementById("registerForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    alert(
        "Registrasi berhasil. Silakan login menggunakan akun yang telah dibuat."
    );

    window.location.href =
    "index.html";

});

</script>

</body>
</html>
```
