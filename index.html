<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Suara Kampus</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">

            <img src="Logo.png"
                 class="login-logo"
                 alt="Logo">

            <h1>

                Suara Kampus

            </h1>

            <p>

                Sistem Pelaporan Kerusakan Fasilitas Kampus

            </p>

        </div>

        <form id="loginForm">

            <div class="form-group">

                <label>

                    Email

                </label>

                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Masukkan email"
                    required>

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Masukkan password"
                    required>

            </div>

            <button
                type="submit"
                class="btn">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Belum memiliki akun?

            <a href="register.html">

                Daftar Sekarang

            </a>

        </div>

        <div class="login-info">


        </div>

        <div class="login-footer">

            © 2026 Suara Kampus

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
